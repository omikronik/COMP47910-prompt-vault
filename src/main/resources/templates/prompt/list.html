<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout-app}"
>
  <head>
    <title>My Prompts</title>
  </head>

  <body>
    <div layout:fragment="content">
      <div class="page-header">
        <div>
          <h1>My Prompts</h1>
          <p class="text-muted">View, edit, and manage your saved prompts.</p>
        </div>
        <a class="btn" th:href="@{/prompts/create}">New Prompt</a>
      </div>

      <div
        th:if="${prompts == null or #lists.isEmpty(prompts)}"
        class="card text-center"
      >
        <h2>No prompts yet</h2>
        <p>Create your first prompt to start using PromptVault.</p>
        <a class="btn mt" th:href="@{/prompts/create}">Create Prompt</a>
      </div>

      <div
        th:if="${prompts != null and !#lists.isEmpty(prompts)}"
        class="stack"
      >
        <article class="card" th:each="prompt : ${prompts}">
          <div class="space-between">
            <div>
              <h2 th:text="${prompt.title}">Prompt title</h2>
              <p
                class="text-muted"
                th:text="${prompt.content != null ? prompt.content : 'No content provided'}"
              >
                Prompt content
              </p>
            </div>

            <div class="row">
              <span
                th:if="${prompt.category!= null}"
                class="badge badge-primary"
                th:text="${prompt.category.name}"
                >Category</span
              >

              <span
                class="badge"
                th:classappend="${prompt.visibility.name() == 'SHARED'} ? ' badge-success' : ' badge-muted'"
                th:text="${prompt.visibility}"
                >PRIVATE</span
              >
            </div>
          </div>

          <div class="row mt-lg">
            <form method="post" th:action="@{/conversations/start}">
              <input type="hidden" name="promptId" th:value="${prompt.id}" />
              <button class="btn btn-secondary btn-sm" type="submit">
                Use
              </button>
            </form>
            <a
              class="btn btn-secondary btn-sm"
              th:href="@{/prompts/{id}/edit(id=${prompt.id})}"
              >Edit</a
            >
            <form
              method="post"
              th:action="@{/prompts/{id}/delete(id=${prompt.id})}"
              onsubmit="return confirm('Delete this prompt?');"
            >
              <button class="btn btn-danger btn-sm" type="submit">
                Delete
              </button>
            </form>
          </div>
        </article>
      </div>
    </div>
  </body>
</html>
