<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout-app}"
>
  <head>
    <title>New Prompt</title>
  </head>

  <body>
    <div layout:fragment="content">
      <div class="page-header">
        <div>
          <h1>New Prompt</h1>
          <p class="text-muted">Create a new prompt.</p>
        </div>
      </div>

      <div class="card">
        <form method="post" th:action="@{/prompts/create}">
          <div class="form-group">
            <label for="title">Title</label>
            <input
              type="text"
              id="title"
              name="title"
              maxlength="255"
              required
            />
          </div>

          <div class="form-group">
            <label for="content">Content</label>
            <textarea
              id="content"
              name="content"
              maxlength="255"
              required
              oninput="updateCounter(this, 'content-count')"
            ></textarea>
            <span
              id="content-count"
              class="text-muted"
              style="font-size: 0.8rem"
              >255 remaining</span
            >
          </div>

          <div class="form-group">
            <label for="categoryId">Category</label>
            <select id="categoryId" name="categoryId">
              <option value="">-- None --</option>
              <option
                th:each="cat : ${categories}"
                th:value="${cat.id}"
                th:text="${cat.name}"
              >
                Category
              </option>
            </select>
          </div>

          <div class="form-group">
            <label for="visibility">Visibility</label>
            <select id="visibility" name="visibility">
              <option value="PRIVATE">Private</option>
              <option value="SHARED">Shared</option>
            </select>
          </div>

          <input type="submit" value="Create Prompt" />
        </form>
      </div>
    </div>

    <script>
      function updateCounter(input, counterId) {
        const remaining = input.maxLength - input.value.length;
        document.getElementById(counterId).textContent =
          remaining + " remaining";
      }
    </script>
  </body>
</html>
