<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout-app}"
>
  <head>
    <title>Edit Prompt</title>
  </head>

  <body>
    <div layout:fragment="content">
      <div class="page-header">
        <div>
          <h1>Edit Prompt</h1>
          <p class="text-muted">Update your saved prompt.</p>
        </div>

        <a
          class="btn btn-secondary"
          th:href="@{/prompts/{id}(id=${prompt.id})}"
        >
          Back to Prompt
        </a>
      </div>

      <div class="card">
        <form method="post" th:action="@{/prompts/{id}/edit(id=${prompt.id})}">
          <div class="form-group">
            <label for="title">Title</label>
            <input
              type="text"
              id="title"
              name="title"
              maxlength="255"
              required
              th:value="${prompt.title}"
            />
          </div>

          <div class="form-group">
            <label for="content">Content</label>
            <textarea
              id="content"
              name="content"
              maxlength="255"
              required
              oninput="updateCounter(this, 'content-count')"
              th:text="${prompt.content}"
            ></textarea>
            <span
              id="content-count"
              class="text-muted"
              style="font-size: 0.8rem"
              th:text="${255 - #strings.length(prompt.content)} + ' remaining'"
            >
              255 remaining
            </span>
          </div>

          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category">
              <option value="">-- None --</option>
              <option
                th:each="cat : ${categories}"
                th:value="${cat.id}"
                th:text="${cat.name}"
                th:selected="${prompt.category != null and prompt.category.id == cat.id}"
              >
                Category
              </option>
            </select>
          </div>

          <div class="form-group">
            <label for="visibility">Visibility</label>
            <select id="visibility" name="visibility">
              <option
                value="PRIVATE"
                th:selected="${prompt.visibility.name() == 'PRIVATE'}"
              >
                Private
              </option>
              <option
                value="SHARED"
                th:selected="${prompt.visibility.name() == 'SHARED'}"
              >
                Shared
              </option>
            </select>
          </div>

          <div class="row actions mt-lg">
            <input type="submit" value="Save Changes" />

            <a
              class="btn btn-secondary"
              th:href="@{/prompts/{id}(id=${prompt.id})}"
            >
              Cancel
            </a>
          </div>
        </form>
      </div>
    </div>

    <script>
      function updateCounter(input, counterId) {
        const remaining = input.maxLength - input.value.length;
        document.getElementById(counterId).textContent =
          remaining + " remaining";
      }
    </script>
  </body>
</html>
