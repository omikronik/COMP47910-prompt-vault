<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout-public}"
>
  <head>
    <title>Register</title>
  </head>

  <body>
    <div layout:fragment="content">
      <div class="card card-shiny">
        <h1 style="margin-bottom: 0.25rem">Create account</h1>
        <p class="text-muted" style="margin-bottom: 1.5rem">
          Join PromptVault to start managing your prompts.
        </p>

        <div
          th:if="${error}"
          class="alert alert-danger mb"
          th:text="${error}"
        ></div>

        <form method="post" th:action="@{/auth/register}">
          <div class="row">
            <div class="form-group w-full">
              <label for="firstName">First Name</label>
              <input
                type="text"
                id="firstName"
                name="firstName"
                maxlength="255"
                required
              />
            </div>
            <div class="form-group w-full">
              <label for="lastName">Last Name</label>
              <input
                type="text"
                id="lastName"
                name="lastName"
                maxlength="255"
                required
              />
            </div>
          </div>
          <div class="form-group">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              name="username"
              maxlength="255"
              required
            />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              maxlength="255"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required />
          </div>
          <input type="submit" value="Create Account" />
        </form>

        <p class="text-center mt" style="font-size: 0.9rem">
          Already have an account?
          <a th:href="@{/auth/login}">Sign in</a>
        </p>
      </div>
    </div>
  </body>
</html>
