<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout-app}"
>
  <head>
    <title>Users</title>
  </head>
  <body>
    <div layout:fragment="content">
      <div class="page-header">
        <div>
          <h1>Users</h1>
          <p class="text-muted">Manage registered user accounts.</p>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Joined</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="u : ${users}">
            <td th:text="${u.username ?: '—'}">username</td>
            <td th:text="${u.email}">user@example.com</td>
            <td>
              <span
                class="badge"
                th:classappend="${u.role.name() == 'ADMIN'} ? ' badge-primary' : ' badge-muted'"
                th:text="${u.role}"
                >USER</span
              >
            </td>
            <td>
              <span
                class="badge"
                th:classappend="${u.isActive} ? ' badge-success' : ' badge-danger'"
                th:text="${u.isActive} ? 'Active' : 'Disabled'"
                >Active</span
              >
            </td>
            <td
              class="text-muted"
              th:text="${#temporals.format(u.createdOn, 'dd MMM yyyy')}"
            >
              01 Jan 2026
            </td>
            <td class="row">
              <a
                class="btn btn-secondary btn-sm"
                th:href="@{/admin/users/{id}(id=${u.id})}"
                >View</a
              >
              <a
                class="btn btn-secondary btn-sm"
                th:href="@{/admin/users/{id}/edit(id=${u.id})}"
                >Edit</a
              >
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
