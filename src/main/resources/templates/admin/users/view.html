<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout-app}"
>
  <head>
    <title>View User</title>
  </head>
  <body>
    <div layout:fragment="content">
      <div class="page-header">
        <div>
          <h1>View User</h1>
          <p class="text-muted" th:text="${target.email}">user@example.com</p>
        </div>
        <div class="row">
          <a class="btn btn-secondary btn-sm" th:href="@{/admin/users}">Back</a>
          <a
            class="btn btn-sm"
            th:href="@{/admin/users/{id}/edit(id=${target.id})}"
            >Edit</a
          >
        </div>
      </div>

      <div class="card">
        <div class="stack">
          <div class="form-group">
            <label>Email</label>
            <input type="text" th:value="${target.email}" disabled />
          </div>
          <div class="form-group">
            <label>Role</label>
            <input type="text" th:value="${target.role}" disabled />
          </div>
          <div class="form-group">
            <label>Status</label>
            <input
              type="text"
              th:value="${target.isActive} ? 'Active' : 'Disabled'"
              disabled
            />
          </div>
          <div class="form-group">
            <label>Login Attempts</label>
            <input type="text" th:value="${target.loginAttempts}" disabled />
          </div>
          <div class="form-group">
            <label>Joined</label>
            <input
              type="text"
              th:value="${#temporals.format(target.createdOn, 'dd MMM yyyy HH:mm')}"
              disabled
            />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
