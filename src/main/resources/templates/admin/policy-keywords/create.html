<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout-app}"
>
  <head>
    <title>New Keyword</title>
  </head>
  <body>
    <div layout:fragment="content">
      <div class="page-header">
        <div>
          <h1>New Keyword</h1>
          <p class="text-muted">
            Add a policy keyword to flag sensitive prompts.
          </p>
        </div>
        <a class="btn btn-secondary btn-sm" th:href="@{/admin/policy-keywords}"
          >Back</a
        >
      </div>

      <div class="card">
        <form method="post" th:action="@{/admin/policy-keywords/create}">
          <div class="form-group">
            <label for="content">Keyword</label>
            <input
              type="text"
              id="content"
              name="content"
              maxlength="255"
              required
            />
          </div>
          <input type="submit" value="Add Keyword" />
        </form>
      </div>
    </div>
  </body>
</html>
