<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout-app}"
>
  <head>
    <title>Flagged Conversations</title>
  </head>
  <body>
    <div layout:fragment="content">
      <div class="page-header">
        <div>
          <h1>Flagged Conversations</h1>
          <p class="text-muted">
            Conversations containing messages that triggered a policy keyword.
          </p>
        </div>
      </div>

      <div th:if="${#lists.isEmpty(conversations)}" class="card text-center">
        <h2>No flagged conversations</h2>
        <p>No conversations have triggered a policy keyword.</p>
      </div>

      <div th:if="${!#lists.isEmpty(conversations)}" class="stack">
        <article class="card" th:each="conv : ${conversations}">
          <div class="space-between">
            <div>
              <h2 th:text="${conv.title}">Conversation title</h2>
              <p class="text-muted">
                <span th:text="${conv.owner.username ?: conv.owner.email}"
                  >owner</span
                >
                &mdash;
                <span
                  th:text="${#temporals.format(conv.createdOn, 'dd MMM yyyy')}"
                  >date</span
                >
              </p>
            </div>
            <form
              method="post"
              th:action="@{/admin/flagged-conversations/{id}/delete(id=${conv.id})}"
              onsubmit="
                return confirm('Permanently delete this entire conversation?');
              "
            >
              <button class="btn btn-danger btn-sm" type="submit">
                Delete
              </button>
            </form>
          </div>

          <div class="stack mt" style="margin-left: 1.5rem">
            <div
              th:each="msg : ${conv.messages}"
              th:if="${msg.policyFlagged}"
              class="flagged-msg-item"
            >
              <span th:text="${msg.content}">flagged message content</span>
            </div>
          </div>
        </article>
      </div>
    </div>
  </body>
</html>
