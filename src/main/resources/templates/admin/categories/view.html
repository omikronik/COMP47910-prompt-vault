<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout-app}"
>
  <head>
    <title>View Category</title>
  </head>
  <body>
    <div layout:fragment="content">
      <div class="page-header">
        <div>
          <h1>View Category</h1>
          <p class="text-muted" th:text="${category.name}">Category name</p>
        </div>
        <div class="row">
          <a class="btn btn-secondary btn-sm" th:href="@{/admin/categories}"
            >Back</a
          >
          <a
            class="btn btn-sm"
            th:href="@{/admin/categories/{id}/edit(id=${category.id})}"
            >Edit</a
          >
        </div>
      </div>

      <div class="card">
        <div class="stack">
          <div class="form-group">
            <label>Name</label>
            <input type="text" th:value="${category.name}" disabled />
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea disabled th:text="${category.description}"></textarea>
          </div>
          <div class="form-group">
            <label>Created</label>
            <input
              type="text"
              th:value="${#temporals.format(category.createdOn, 'dd MMM yyyy HH:mm')}"
              disabled
            />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
