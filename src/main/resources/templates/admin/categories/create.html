<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout-app}"
>
  <head>
    <title>New Category</title>
  </head>
  <body>
    <div layout:fragment="content">
      <div class="page-header">
        <div>
          <h1>New Category</h1>
          <p class="text-muted">Create a new prompt category.</p>
        </div>
        <a class="btn btn-secondary btn-sm" th:href="@{/admin/categories}"
          >Back</a
        >
      </div>

      <div class="card">
        <form method="post" th:action="@{/admin/categories/create}">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" maxlength="255" required />
          </div>
          <div class="form-group">
            <label for="description">Description</label>
            <textarea
              id="description"
              name="description"
              maxlength="255"
              required
            ></textarea>
          </div>
          <input type="submit" value="Create Category" />
        </form>
      </div>
    </div>
  </body>
</html>
